name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  GO_VERSION: '1.21'
  JAVA_VERSION: '25'
  PYTHON_VERSION: '3.11'
  RUST_VERSION: '1.75'
  NODE_VERSION: '20'

jobs:
  lint:
    name: Code Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Lint Go code
        run: |
          if [ -d "backend" ]; then
            find backend -name "*.go" -type f | head -1 && \
            go install golang.org/x/lint/golint@latest && \
            golint ./backend/... || true
          fi

      - name: Check Go formatting
        run: |
          if [ -d "backend" ]; then
            gofmt -l ./backend 2>/dev/null || true
          fi

      - name: Lint Python code
        run: |
          pip install flake8 black isort
          if [ -d "backend/grade-service" ] || [ -d "backend/learning-service" ]; then
            flake8 ./backend --count --select=E9,F63,F7,F82 --show-source --statistics || true
          fi

      - name: Check Rust formatting
        run: |
          if [ -d "backend/homework-service" ]; then
            cd backend/homework-service
            cargo fmt -- --check || true
            cargo clippy -- -D warnings || true
          fi

      - name: Lint Java code
        run: |
          if [ -d "backend/student-service" ]; then
            cd backend/student-service
            ./gradlew spotlessCheck || true
          fi

      - name: Lint Node.js code
        run: |
          if [ -d "frontend/web" ]; then
            cd frontend/web
            npm ci || npm install
            npm run lint || true
          fi

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Go tests
        run: |
          for dir in backend/api-gateway backend/auth-service backend/exam-service; do
            if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
              echo "Testing $dir..."
              cd $dir
              go mod download
              go test -v -race -coverprofile=coverage.out ./...
              cd -
            fi
          done

  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Run Java tests
        run: |
          for dir in backend/student-service backend/communication-service; do
            if [ -d "$dir" ] && [ -f "$dir/build.gradle" ]; then
              echo "Testing $dir..."
              cd $dir
              ./gradlew test
              cd -
            fi
          done

  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run Python tests
        run: |
          for dir in backend/grade-service backend/learning-service; do
            if [ -d "$dir" ] && [ -f "$dir/requirements.txt" ]; then
              echo "Testing $dir..."
              cd $dir
              pip install -r requirements.txt
              pytest --cov=. --cov-report=xml || true
              cd -
            fi
          done

  test-rust:
    name: Test Rust Services
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: |
          if [ -d "backend/homework-service" ] && [ -f "backend/homework-service/Cargo.toml" ]; then
            cd backend/homework-service
            cargo test --verbose
          fi

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Test Web
        run: |
          if [ -d "frontend/web" ] && [ -f "frontend/web/package.json" ]; then
            cd frontend/web
            npm ci || npm install
            npm run test:unit || true
          fi

      - name: Test Mobile
        run: |
          if [ -d "frontend/mobile" ] && [ -f "frontend/mobile/pubspec.yaml" ]; then
            cd frontend/mobile
            flutter pub get || true
            flutter test || true
          fi

  build:
    name: Build Services
    runs-on: ubuntu-latest
    needs: [test-go, test-java, test-python, test-rust, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Go services
        run: |
          for dir in backend/api-gateway backend/auth-service backend/exam-service; do
            if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
              echo "Building $dir..."
              cd $dir
              go build -o bin/ ./...
              cd -
            fi
          done

      - name: Build Java services
        run: |
          for dir in backend/student-service backend/communication-service; do
            if [ -d "$dir" ] && [ -f "$dir/build.gradle" ]; then
              echo "Building $dir..."
              cd $dir
              ./gradlew build
              cd -
            fi
          done

      - name: Build Python services
        run: |
          for dir in backend/grade-service backend/learning-service; do
            if [ -d "$dir" ] && [ -f "$dir/requirements.txt" ]; then
              echo "Building $dir..."
              cd $dir
              pip install -r requirements.txt
              cd -
            fi
          done

      - name: Build Rust services
        run: |
          if [ -d "backend/homework-service" ] && [ -f "backend/homework-service/Cargo.toml" ]; then
            cd backend/homework-service
            cargo build --release
          fi

      - name: Build Frontend
        run: |
          if [ -d "frontend/web" ] && [ -f "frontend/web/package.json" ]; then
            cd frontend/web
            npm ci
            npm run build
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: always()
    steps:
      - name: Send notification
        run: |
          echo "CI/CD Pipeline completed with status: ${{ needs.build.result }}"
