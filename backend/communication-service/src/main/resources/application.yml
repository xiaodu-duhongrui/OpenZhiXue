server:
  port: 8084

spring:
  application:
    name: communication-service
  
  datasource:
    url: jdbc:postgresql://localhost:5432/openzhixue_communication
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/openzhixue_messages
    redis:
      host: localhost
      port: 6379
      password: 
      database: 3
      timeout: 10000ms
  
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

jwt:
  secret: openzhixue-jwt-secret-key-for-communication-service-2024
  expiration: 86400000

firebase:
  enabled: false
  config-path: classpath:firebase-service-account.json

jpush:
  enabled: false
  app-key: your-app-key
  master-secret: your-master-secret

websocket:
  endpoint: /ws
  allowed-origins: "*"

logging:
  level:
    com.openzhixue: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
