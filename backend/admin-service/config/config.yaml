server:
  host: "0.0.0.0"
  port: 8081
  mode: "debug"

database:
  driver: "postgres"
  host: "localhost"
  port: 5432
  username: "postgres"
  password: "postgres123"
  dbname: "openzhixue_admin"
  sslmode: "disable"
  max_idle_conns: 10
  max_open_conns: 100

jwt:
  secret: "admin-service-secret-key-change-in-production"
  issuer: "openzhixue-admin"
  access_token_expire: 7200

crypto:
  aes_key: "0123456789abcdef0123456789abcdef"
  rsa_private_key_path: "./keys/private.pem"
  rsa_public_key_path: "./keys/public.pem"

import:
  upload_dir: "./uploads"
  max_file_size: 10485760

log:
  level: "debug"
  format: "console"
